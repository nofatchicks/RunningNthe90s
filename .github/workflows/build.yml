name: SoulWoRn Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyinstaller anthropic requests pyserial

      - name: Build exe
        run: pyinstaller --onefile --windowed --name soulworn_win soulworn_win.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-windows
          path: dist/soulworn_win.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk
          pip install pyinstaller anthropic requests pyserial

      - name: Build binary
        run: pyinstaller --onefile --name soulworn_linux soulworn_win.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-linux
          path: dist/soulworn_linux

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip git
          pip install pyinstaller anthropic requests pyserial --break-system-packages

      - name: Build binary
        run: pyinstaller --onefile --name soulworn_arch_bin soulworn_win.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-arch
          path: dist/soulworn_arch_bin

  release:
    needs: [build-windows, build-linux, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Debug artifact paths
        run: find artifacts/ -type f

      - name: Get version
        id: version
        run: echo "ver=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: SoulWoRn ${{ steps.version.outputs.ver }}
          body: |
            ## SoulWoRn -- Android Toolbox
            Build: ${{ steps.version.outputs.ver }}

            | Platform | File | Notes |
            |---|---|---|
            | Windows | soulworn_win.exe | double-click, no install needed |
            | Linux | soulworn_linux | chmod +x then run |
            | Arch | soulworn_arch_bin | Arch/Manjaro/EndeavourOS |

            No Python needed. No PATH needed. No admin needed.
            ghost in the machine -- nofatchicks
          files: |
            artifacts/soulworn-windows/soulworn_win.exe
            artifacts/soulworn-linux/soulworn_linux
            artifacts/soulworn-arch/soulworn_arch_bin
          draft: false
          prerelease: false

      - name: Generate Pages
        run: |
          mkdir -p docs
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>SoulWoRn</title>
          <style>
            body { background:#0a0a0e; color:#e8e8e8; font-family:monospace; text-align:center; padding:40px 20px; }
            pre  { color:#cc0000; font-size:clamp(6px,1.4vw,12px); line-height:1.2; margin-bottom:24px; }
            h1   { color:#cc0000; font-size:2em; margin-bottom:8px; }
            .sub { color:#6622cc; margin-bottom:32px; }
            .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; max-width:860px; margin:0 auto 40px; text-align:left; }
            .card { background:#12121a; border:1px solid #cc0000; border-radius:8px; padding:20px; }
            .card h2 { color:#aa44ff; margin-bottom:8px; }
            .card p  { color:#666677; font-size:.85em; margin-bottom:12px; }
            .cmd { background:#020208; color:#00ff88; padding:8px; border-radius:4px; font-size:.78em; margin-bottom:12px; word-break:break-all; }
            .btn { display:block; background:#cc0000; color:#fff; text-decoration:none; text-align:center; padding:10px; border-radius:6px; font-weight:bold; }
            .btn:hover { background:#ff2222; }
            .p { background:#6622cc; }
            .p:hover { background:#aa44ff; }
            .d { background:#1a1a26; border:1px solid #cc0000; }
            footer { color:#333344; font-size:.8em; margin-top:40px; }
            a { color:#6622cc; }
          </style>
          </head>
          <body>
          <pre>SoulWoRn -- Android Toolbox</pre>
          <h1>SoulWoRn</h1>
          <div class="sub">android toolbox &bull; ghost in the machine &bull; nofatchicks &bull; GPL-3.0</div>
          <div class="cards">
            <div class="card">
              <h2>Windows</h2>
              <p>Double-click and run. No Python, no PATH, no admin.</p>
              <div class="cmd">soulworn_win.exe</div>
              <a class="btn" href="https://github.com/nofatchicks/RunningNthe90s/releases/latest/download/soulworn_win.exe">Download .exe</a>
            </div>
            <div class="card">
              <h2>Linux</h2>
              <p>Single binary, any x86_64 distro.</p>
              <div class="cmd">chmod +x soulworn_linux && ./soulworn_linux</div>
              <a class="btn p" href="https://github.com/nofatchicks/RunningNthe90s/releases/latest/download/soulworn_linux">Download Linux</a>
            </div>
            <div class="card">
              <h2>Arch Linux</h2>
              <p>Native Arch/Manjaro/EndeavourOS binary.</p>
              <div class="cmd">chmod +x soulworn_arch_bin && ./soulworn_arch_bin</div>
              <a class="btn p" href="https://github.com/nofatchicks/RunningNthe90s/releases/latest/download/soulworn_arch_bin">Download Arch</a>
            </div>
            <div class="card">
              <h2>Source</h2>
              <p>Python 3.9+ -- pip install anthropic for AI features.</p>
              <div class="cmd">python soulworn_win.py</div>
              <a class="btn d" href="https://github.com/nofatchicks/RunningNthe90s">GitHub Source</a>
            </div>
          </div>
          <footer>nofatchicks &bull; kelowna bc &bull; GPL-3.0 &bull; <a href="https://github.com/nofatchicks/RunningNthe90s">github</a></footer>
          </body>
          </html>
          EOF

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
