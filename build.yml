name: SoulWoRn Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── BUILD WINDOWS EXE ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pyinstaller anthropic requests pyserial pyusb
          pip install pillow  # for icon

      - name: Build exe
        run: |
          pyinstaller --onefile `
            --windowed `
            --name soulworn_win `
            --icon scripts/icon.ico `
            --add-data "scripts/icon.ico;." `
            soulworn_win.py
        continue-on-error: true

      - name: Build exe (no icon fallback)
        if: failure()
        run: |
          pyinstaller --onefile --windowed --name soulworn_win soulworn_win.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-windows
          path: dist/soulworn_win.exe

  # ── BUILD LINUX BINARY ─────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk android-tools-adb

      - name: Install Python deps
        run: |
          pip install pyinstaller anthropic requests pyserial

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name soulworn_linux soulworn_win.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-linux
          path: dist/soulworn_linux

  # ── BUILD ARCH BINARY ──────────────────────────────────────────────────────
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip android-tools git

      - name: Install Python deps
        run: |
          pip install pyinstaller anthropic requests pyserial --break-system-packages

      - name: Build Arch binary
        run: |
          pyinstaller --onefile --name soulworn_arch_bin soulworn_arch.py || \
          pyinstaller --onefile --name soulworn_arch_bin soulworn_win.py

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulworn-arch
          path: dist/soulworn_arch_bin

  # ── CREATE RELEASE ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "ver=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: SoulWoRn ${{ steps.version.outputs.ver }}
          body: |
            ## SoulWoRn - Auto Build ${{ steps.version.outputs.ver }}

            ### Download for your platform:

            | Platform | File | Notes |
            |---|---|---|
            | Windows | `soulworn_win.exe` | Double-click, no install needed |
            | Linux | `soulworn_linux` | `chmod +x soulworn_linux && ./soulworn_linux` |
            | Arch Linux | `soulworn_arch_bin` | Arch/Manjaro/EndeavourOS |

            ### No Python needed. No PATH needed. No admin needed.

            > ghost in the machine -- nofatchicks
          files: |
            artifacts/soulworn-windows/soulworn_win.exe
            artifacts/soulworn-linux/soulworn_linux
            artifacts/soulworn-arch/soulworn_arch_bin
          draft: false
          prerelease: false

      - name: Generate download page
        run: |
          VERSION="${{ steps.version.outputs.ver }}"
          REPO="nofatchicks/soulworn"
          cat > docs/index.html << HTMLEOF
